name: Deploy 3DClinical Landing

on:
  push:
    branches:
      - main  # Cambia in 'master' se usi master come branch principale

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        docker build -t 3dclinical-landing:latest .

    - name: Save Docker Image
      run: |
        docker save 3dclinical-landing:latest -o 3dclinical-landing.tar

    - name: Change File Permissions
      run: |
        chmod 644 ./3dclinical-landing.tar

    - name: Copy Docker Image to Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: ./3dclinical-landing.tar
        target: /root/3dclinical-landing.tar

    - name: Deploy Container on Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Load the new image
          docker load -i /root/3dclinical-landing.tar/3dclinical-landing.tar

          # Stop and remove old container
          docker stop 3dclinical-landing || true
          docker rm 3dclinical-landing || true

          # Run new container with environment variables
          # IMPORTANTE: Assicurati di avere un file .env sul server in /root/.env.3dclinical-landing
          docker run -d \
            --name 3dclinical-landing \
            -p 3000:3000 \
            --restart unless-stopped \
            --env-file /root/.env.3dclinical-landing \
            3dclinical-landing:latest

          # Cleanup
          rm -f -R /root/3dclinical-landing.tar

          # Optional: Remove old unused images to save space
          docker image prune -f

          # Check if container is running
          sleep 3
          if docker ps | grep -q 3dclinical-landing; then
            echo "✅ Container deployed successfully"
            docker logs --tail 20 3dclinical-landing
          else
            echo "❌ Container failed to start"
            docker logs 3dclinical-landing
            exit 1
          fi
